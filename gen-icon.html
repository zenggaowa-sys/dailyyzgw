<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>生成192图标</title></head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#f5f6fa">
<h2>图标生成工具</h2>
<p>正在从 icon-512.png 生成 icon-192.png ...</p>
<canvas id="c" width="192" height="192" style="border:1px solid #ccc;border-radius:12px;margin:20px"></canvas>
<p id="status">加载中...</p>
<a id="dl" style="display:none;padding:12px 24px;background:#6366F1;color:#fff;border-radius:8px;text-decoration:none;font-weight:bold">下载 icon-192.png</a>
<script>
const img = new Image();
img.onload = () => {
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, 192, 192);
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.getElementById('dl');
    a.href = url;
    a.download = 'icon-192.png';
    a.style.display = 'inline-block';
    document.getElementById('status').textContent = '✅ 生成成功！点击下方按钮下载，然后把文件放到 public/icons/ 文件夹里';
  }, 'image/png');
};
img.onerror = () => {
  document.getElementById('status').textContent = '❌ 加载图片失败，请确保 public/icons/icon-512.png 存在';
};
img.src = 'public/icons/icon-512.png';
</script>
</body>
</html>
